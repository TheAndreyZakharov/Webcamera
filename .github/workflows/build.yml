name: Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Android project
        id: android-project
        shell: bash
        run: |
          if [ -f "android-app/gradlew" ] && [ -f "android-app/app/build.gradle" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.android-project.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: steps.android-project.outputs.exists == 'true'
        run: chmod +x android-app/gradlew

      - name: Build Android APK
        if: steps.android-project.outputs.exists == 'true'
        working-directory: android-app
        run: ./gradlew clean assembleDebug

      - name: Upload Android APK
        if: steps.android-project.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-Android
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Skip Android build
        if: steps.android-project.outputs.exists != 'true'
        run: echo "Android project is not ready yet."

  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Xcode project
        run: test -f macos-app/Webcamera/Webcamera.xcodeproj/project.pbxproj

      - name: Build macOS application
        run: |
          xcodebuild \
            -project macos-app/Webcamera/Webcamera.xcodeproj \
            -scheme Webcamera \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/WebcameraDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Verify application bundle
        run: |
          test -d "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app"

      - name: Create macOS archive
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app" \
            "$RUNNER_TEMP/Webcamera-macOS.zip"

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-macOS
          path: ${{ runner.temp }}/Webcamera-macOS.zip
          if-no-files-found: error
