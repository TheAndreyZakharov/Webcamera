name: Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Android project
        shell: bash
        run: |
          test -f android-app/gradlew
          test -f android-app/settings.gradle
          test -f android-app/app/build.gradle

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            android-app/**/*.gradle
            android-app/gradle/wrapper/gradle-wrapper.properties

      - name: Make Gradle wrapper executable
        run: chmod +x android-app/gradlew

      - name: Build Android APK
        working-directory: android-app
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Verify Android APK
        run: |
          test -f \
            android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-Android-Debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Xcode project
        shell: bash
        run: |
          test -f \
            macos-app/Webcamera/Webcamera.xcodeproj/project.pbxproj

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build macOS application
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/WebcameraDerivedData"

          rm -rf "$DERIVED_DATA"

          xcodebuild \
            -project macos-app/Webcamera/Webcamera.xcodeproj \
            -scheme Webcamera \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Verify application bundle
        shell: bash
        run: |
          test -d \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app"

          test -f \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app/Contents/MacOS/Webcamera"

      - name: Apply ad-hoc signature
        shell: bash
        run: |
          codesign \
            --force \
            --deep \
            --sign - \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app"

          codesign \
            --verify \
            --deep \
            --strict \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app"

      - name: Create macOS archive
        shell: bash
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app" \
            "$RUNNER_TEMP/Webcamera-macOS.zip"

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-macOS-Release
          path: ${{ runner.temp }}/Webcamera-macOS.zip
          if-no-files-found: error
          retention-days: 14
