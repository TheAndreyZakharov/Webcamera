name: Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android-app/gradlew

      - name: Build Android APK
        working-directory: android-app
        run: ./gradlew clean assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-Android
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for Xcode project
        id: project
        shell: bash
        run: |
          if [ -d "macos-app/Webcamera/Webcamera.xcodeproj" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS application
        if: steps.project.outputs.exists == 'true'
        run: |
          xcodebuild \
            -project macos-app/Webcamera/Webcamera.xcodeproj \
            -scheme Webcamera \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/WebcameraDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create macOS archive
        if: steps.project.outputs.exists == 'true'
        run: |
          APP_PATH="$RUNNER_TEMP/WebcameraDerivedData/Build/Products/Release/Webcamera.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Webcamera.app was not created."
            exit 1
          fi

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$APP_PATH" \
            "$RUNNER_TEMP/Webcamera-macOS.zip"

      - name: Upload macOS application
        if: steps.project.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Webcamera-macOS
          path: ${{ runner.temp }}/Webcamera-macOS.zip
          if-no-files-found: error

      - name: Skip missing macOS project
        if: steps.project.outputs.exists != 'true'
        run: |
          echo "The macOS Xcode project has not been created yet."
          echo "The macOS build will start automatically after the project is committed."
